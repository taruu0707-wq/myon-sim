<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ミューオン到達シミュレーション</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #060c18;
    color: #c8d8f0;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  h1 {
    text-align: center;
    font-size: 1.3rem;
    letter-spacing: 0.12em;
    color: #90baff;
    margin-bottom: 2rem;
    text-shadow: 0 0 16px #4080ff55;
  }

  /* ── スライダー ── */
  .controls {
    max-width: 540px;
    margin: 0 auto 2rem;
    background: #0b1525;
    border: 1px solid #1b3450;
    border-radius: 10px;
    padding: 1.4rem 1.6rem;
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
  }

  .slider-row {
    display: grid;
    grid-template-columns: 8rem 1fr 7rem;
    align-items: center;
    gap: 0.8rem;
  }

  .slider-label { font-size: 0.88rem; color: #7090b0; }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: #1b3450;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    background: #4a9eff;
    border-radius: 50%;
    box-shadow: 0 0 6px #4a9eff88;
  }

  .slider-val {
    text-align: right;
    font-size: 0.9rem;
    color: #ddeeff;
    font-weight: bold;
  }

  /* ── 結果 ── */
  .results {
    max-width: 540px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .gamma-box {
    text-align: center;
    background: #0b1525;
    border: 1px solid #1b3450;
    border-radius: 10px;
    padding: 0.9rem;
    font-size: 1.25rem;
    color: #ffd060;
    text-shadow: 0 0 10px #ffd06044;
    letter-spacing: 0.05em;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .card {
    background: #0b1525;
    border: 1px solid #1b3450;
    border-radius: 10px;
    padding: 1.2rem;
  }
  .card.no-rel   { border-top: 3px solid #ff5555; }
  .card.with-rel { border-top: 3px solid #44dd88; }

  .card h2 {
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    margin-bottom: 0.9rem;
  }
  .card.no-rel   h2 { color: #ff7777; }
  .card.with-rel h2 { color: #55ee99; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.32rem 0;
    border-bottom: 1px solid #162840;
    font-size: 0.88rem;
  }
  .stat-row:last-child { border-bottom: none; }

  .stat-label { color: #607090; }
  .stat-val         { color: #ddeeff; font-weight: bold; }
  .stat-val.theory  { color: #8aaac8; font-weight: normal; }

  /* ── 再生ボタン ── */
  .replay-btn {
    display: block;
    margin: 0 auto 1.2rem;
    padding: 0.5rem 2rem;
    background: #0b1525;
    border: 1px solid #1b3450;
    border-radius: 8px;
    color: #90baff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: border-color 0.15s, color 0.15s;
  }
  .replay-btn:hover { border-color: #4a9eff; color: #ddeeff; }

  /* ── Canvas パネル ── */
  .vis-section {
    max-width: 540px;
    margin: 1.2rem auto 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .vis-section canvas {
    display: block;
    width: 100%;
    border-radius: 10px;
    border: 1px solid #1b3450;
  }
</style>
</head>
<body>
  <h1>ミューオン到達シミュレーション</h1>

  <div class="controls">
    <div class="slider-row">
      <span class="slider-label">高度 H</span>
      <input type="range" id="sl-H" min="1" max="30" step="1" value="15">
      <span class="slider-val" id="val-H">15 km</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">速度 v</span>
      <input type="range" id="sl-v" min="900" max="999" step="1" value="998">
      <span class="slider-val" id="val-v">0.998 c</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">個数 N</span>
      <input type="range" id="sl-N" min="1000" max="50000" step="1000" value="10000">
      <span class="slider-val" id="val-N">10,000</span>
    </div>
  </div>

  <div class="results">
    <div class="gamma-box">
      ローレンツ因子 &nbsp; &gamma; = <span id="disp-gamma">—</span>
    </div>
    <div class="cards">
      <div class="card no-rel">
        <h2>相対論なし</h2>
        <div class="stat-row">
          <span class="stat-label">実測生存率</span>
          <span class="stat-val" id="nr-rate">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">理論値</span>
          <span class="stat-val theory" id="nr-theory">—</span>
        </div>
      </div>
      <div class="card with-rel">
        <h2>相対論あり</h2>
        <div class="stat-row">
          <span class="stat-label">実測生存率</span>
          <span class="stat-val" id="wr-rate">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">理論値</span>
          <span class="stat-val theory" id="wr-theory">—</span>
        </div>
      </div>
    </div>
  </div>

  <div class="vis-section">
    <canvas id="canvas-nr"></canvas>
    <canvas id="canvas-wr"></canvas>
  </div>

<!-- ═══════════════════════════════════════════════════════════
     計算ロジック (変更なし)
════════════════════════════════════════════════════════════ -->
<script>
// ── 定数 ────────────────────────────────────────────────
const C     = 2.998e8; // m/s
const TAU0  = 2.2;     // μs (ミューオン固有寿命)

// ── 1. γ の計算 ─────────────────────────────────────────
function computeGamma(beta) {
  return 1 / Math.sqrt(1 - beta * beta);
}

// ── 2. 地表系での移動時間 (μs) ──────────────────────────
function computeTravelTime(H_km, beta) {
  const H_m   = H_km * 1e3;
  const v_ms  = beta * C;
  return (H_m / v_ms) * 1e6; // s → μs
}

// ── 3. 崩壊時刻を指数分布でサンプリング (μs) ───────────
function sampleDecayTimes(N, tau0_us) {
  const times = new Float64Array(N);
  for (let i = 0; i < N; i++) {
    let u;
    do { u = Math.random(); } while (u === 0); // u ∈ (0,1]
    times[i] = -tau0_us * Math.log(u);
  }
  return times;
}

// ── 4. 生存数カウント (t_decay > properTime なら生存) ───
function countSurvivors(decayTimes, properTime_us) {
  let count = 0;
  for (let i = 0; i < decayTimes.length; i++) {
    if (decayTimes[i] > properTime_us) count++;
  }
  return count;
}

// ── 5. 理論生存率 exp(-properTime / τ0) ─────────────────
function theorySurvival(properTime_us, tau0_us) {
  return Math.exp(-properTime_us / tau0_us);
}

// ── 6. シミュレーション本体 ──────────────────────────────
function runSimulation({ H_km, beta, N }) {
  const gamma    = computeGamma(beta);
  const t_travel = computeTravelTime(H_km, beta); // μs (地表系)

  const decayTimes = sampleDecayTimes(N, TAU0);

  // 相対論なし: ミューオン固有時 = t_travel
  const noRelProper    = t_travel;
  const noRelSurvivors = countSurvivors(decayTimes, noRelProper);

  // 相対論あり: ミューオン固有時 = t_travel / γ
  const relProper      = t_travel / gamma;
  const relSurvivors   = countSurvivors(decayTimes, relProper);

  return {
    gamma,
    t_travel,
    no_rel: {
      properTime: noRelProper,
      survivors:  noRelSurvivors,
      rate:       noRelSurvivors / N,
      theory:     theorySurvival(noRelProper, TAU0),
    },
    with_rel: {
      properTime: relProper,
      survivors:  relSurvivors,
      rate:       relSurvivors / N,
      theory:     theorySurvival(relProper, TAU0),
    },
  };
}

// ── 7. 結果を console.log で出力 ─────────────────────────
function logResults(label, result) {
  const { gamma, t_travel, no_rel: nr, with_rel: wr } = result;
  console.group(`=== ${label} ===`);
  console.log(`γ          = ${gamma.toFixed(5)}`);
  console.log(`t_travel   = ${t_travel.toFixed(4)} μs  (地表系)`);
  console.log(`--- 相対論なし ---`);
  console.log(`  固有時間  = ${nr.properTime.toFixed(4)} μs`);
  console.log(`  生存率(実測) = ${(nr.rate   * 100).toFixed(3)} %`);
  console.log(`  生存率(理論) = ${(nr.theory * 100).toFixed(3)} %`);
  console.log(`--- 相対論あり ---`);
  console.log(`  固有時間  = ${wr.properTime.toFixed(4)} μs`);
  console.log(`  生存率(実測) = ${(wr.rate   * 100).toFixed(3)} %`);
  console.log(`  生存率(理論) = ${(wr.theory * 100).toFixed(3)} %`);
  console.groupEnd();
}
</script>

<!-- ═══════════════════════════════════════════════════════════
     UI 配線 (追加)
════════════════════════════════════════════════════════════ -->
<script>
function updateUI() {
  const H_km = +document.getElementById('sl-H').value;
  const beta  = document.getElementById('sl-v').value / 1000;
  const N     = +document.getElementById('sl-N').value;

  document.getElementById('val-H').textContent = `${H_km} km`;
  document.getElementById('val-v').textContent = `${beta.toFixed(3)} c`;
  document.getElementById('val-N').textContent = N.toLocaleString();

  const r = runSimulation({ H_km, beta, N });

  document.getElementById('disp-gamma').textContent = r.gamma.toFixed(4);
  document.getElementById('nr-rate').textContent    = (r.no_rel.rate    * 100).toFixed(2) + ' %';
  document.getElementById('nr-theory').textContent  = (r.no_rel.theory  * 100).toFixed(2) + ' %';
  document.getElementById('wr-rate').textContent    = (r.with_rel.rate   * 100).toFixed(2) + ' %';
  document.getElementById('wr-theory').textContent  = (r.with_rel.theory * 100).toFixed(2) + ' %';

  startAnimation(H_km, beta, N);
}

['sl-H', 'sl-v', 'sl-N'].forEach(id =>
  document.getElementById(id).addEventListener('input', updateUI)
);

updateUI(); // 初期表示
</script>

<!-- ═══════════════════════════════════════════════════════════
     Canvas アニメーション (追加)
════════════════════════════════════════════════════════════ -->
<script>
const ANIM_MS     = 4000; // アニメーション時間 (ms)
const VIS_MAX     = 200;  // 描画する粒子の上限
const LABEL_H     = 22;   // パネル上部ラベル領域
const GROUND_PX   = 28;   // 地面の厚み
const P_RADIUS    = 2.5;  // 粒子の半径
const DEATH_FADE  = 0.07; // 崩壊フラッシュの長さ (progress単位)

let _particles = [];  // 可視化用粒子: { x, fnr, fwr }
let _animId    = null;
let _animT0    = null;

// Canvas のピクセルサイズを DOM の実幅に合わせる
function _resizeCanvas(c) {
  const w = c.parentElement.clientWidth;
  if (c.width !== w) { c.width = w; c.height = Math.round(w * 1.55); }
}

// 可視化用に別サンプルを生成 (統計用 runSimulation とは独立)
function _buildParticles(vis_N, t_travel, gamma) {
  const cnr = document.getElementById('canvas-nr');
  const W   = cnr.width;
  const arr = [];
  for (let i = 0; i < vis_N; i++) {
    let u;
    do { u = Math.random(); } while (u === 0);
    const td = -TAU0 * Math.log(u); // 崩壊時刻 (μs)
    arr.push({
      x:   4 + Math.random() * (W - 8),
      fnr: td / t_travel,           // 無相対論: 崩壊する progress
      fwr: (td * gamma) / t_travel, // 相対論あり: 崩壊する progress
    });
  }
  return arr;
}

function _drawPanel(ctx, W, H, fracKey, label, accentColor, prog) {
  ctx.clearRect(0, 0, W, H);

  // 空のグラデーション
  const sky = ctx.createLinearGradient(0, 0, 0, H - GROUND_PX);
  sky.addColorStop(0, '#030710');
  sky.addColorStop(1, '#091828');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H - GROUND_PX);

  // 地面
  ctx.fillStyle = '#162810';
  ctx.fillRect(0, H - GROUND_PX, W, GROUND_PX);
  ctx.strokeStyle = '#3a6020';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, H - GROUND_PX);
  ctx.lineTo(W, H - GROUND_PX);
  ctx.stroke();

  // パネルラベル
  ctx.fillStyle = accentColor;
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(label, W / 2, 15);

  const drawH = H - LABEL_H - GROUND_PX;

  _particles.forEach(p => {
    const frac    = p[fracKey];
    const alive   = prog <= frac;
    const survived = frac >= 1;
    const sinceDecay = prog - frac;

    // 完全に消滅済み
    if (!alive && sinceDecay > DEATH_FADE) return;

    const posY = LABEL_H + Math.min(prog, frac, 1) * drawH;

    ctx.beginPath();
    ctx.arc(p.x, posY, P_RADIUS, 0, Math.PI * 2);

    if (!alive) {
      // 崩壊フラッシュ: オレンジが DEATH_FADE かけて消える
      const a = 1 - sinceDecay / DEATH_FADE;
      ctx.fillStyle = `rgba(255,130,40,${a.toFixed(2)})`;
      ctx.shadowColor = '#ff8228';
      ctx.shadowBlur  = 8;
    } else if (survived && prog >= 1) {
      // 地表到達: 緑グロー
      ctx.fillStyle   = '#44ff88';
      ctx.shadowColor = '#44ff88';
      ctx.shadowBlur  = 12;
    } else {
      // 降下中
      ctx.fillStyle   = '#7fc8ff';
      ctx.shadowColor = '#4a9eff';
      ctx.shadowBlur  = 3;
    }

    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function _animLoop(ts) {
  if (!_animT0) _animT0 = ts;
  const prog = Math.min((ts - _animT0) / ANIM_MS, 1);

  const cnr = document.getElementById('canvas-nr');
  const cwr = document.getElementById('canvas-wr');
  _resizeCanvas(cnr);
  _resizeCanvas(cwr);

  _drawPanel(cnr.getContext('2d'), cnr.width, cnr.height,
             'fnr', '相対論なし', '#ff7777', prog);
  _drawPanel(cwr.getContext('2d'), cwr.width, cwr.height,
             'fwr', '相対論あり', '#55ee99', prog);

  if (prog < 1) {
    _animId = requestAnimationFrame(_animLoop);
  }
}

function startAnimation(H_km, beta, N) {
  if (_animId) { cancelAnimationFrame(_animId); _animId = null; }
  _animT0 = null;

  const gamma    = computeGamma(beta);
  const t_travel = computeTravelTime(H_km, beta);
  const vis_N    = Math.min(N, VIS_MAX);

  // Canvas サイズを確定してから粒子を生成 (x 座標のため)
  const cnr = document.getElementById('canvas-nr');
  _resizeCanvas(cnr);
  _resizeCanvas(document.getElementById('canvas-wr'));

  _particles = _buildParticles(vis_N, t_travel, gamma);
  _animId    = requestAnimationFrame(_animLoop);
}
</script>
</body>
</html>
